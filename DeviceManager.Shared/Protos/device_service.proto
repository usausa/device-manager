syntax = "proto3";

option csharp_namespace = "DeviceManager.Shared.Grpc";

package devicemanager;

service DeviceManagerService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc ReportStatus(StatusReport) returns (StatusResponse);
  rpc SendMessage(DeviceMessage) returns (MessageResponse);
  rpc SendLog(LogRequest) returns (LogResponse);
  rpc GetConfig(ConfigRequest) returns (ConfigResponse);
  rpc GetDataStoreValue(DataStoreRequest) returns (DataStoreResponse);
  rpc SetDataStoreValue(DataStoreSetRequest) returns (DataStoreResponse);
  rpc Subscribe(SubscribeRequest) returns (stream ServerEvent);
}

message RegisterRequest {
  string device_id = 1;
  string name = 2;
  string platform = 3;
  string group = 4;
  map<string, string> additional_info = 5;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}

message StatusReport {
  string device_id = 1;
  int32 level = 2;
  double progress = 3;
  optional int32 battery = 4;
  optional double latitude = 5;
  optional double longitude = 6;
  map<string, string> custom_data = 7;
  optional int32 wifi_rssi = 8;
}

message StatusResponse {
  bool success = 1;
}

message DeviceMessage {
  string device_id = 1;
  string message_type = 2;
  string content = 3;
}

message MessageResponse {
  bool success = 1;
  int64 message_id = 2;
}

message LogRequest {
  string device_id = 1;
  int32 level = 2;
  string category = 3;
  string message = 4;
  string exception = 5;
  string timestamp = 6;
}

message LogResponse {
  bool success = 1;
}

message ConfigRequest {
  string device_id = 1;
}

message ConfigResponse {
  repeated ConfigItem items = 1;
}

message ConfigItem {
  string key = 1;
  string value = 2;
  string value_type = 3;
  string description = 4;
}

message DataStoreRequest {
  string device_id = 1;
  string key = 2;
}

message DataStoreSetRequest {
  string device_id = 1;
  string key = 2;
  string value = 3;
}

message DataStoreResponse {
  bool success = 1;
  string value = 2;
}

message SubscribeRequest {
  string device_id = 1;
}

message ServerEvent {
  string event_type = 1;
  string payload = 2;
}
